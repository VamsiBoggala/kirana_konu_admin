<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Kirana Konu - Admin Panel">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Kirana Konu Admin">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Kirana Konu - Admin Panel</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Splash Screen Styles */
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }

    #splash-screen.fade-out {
      opacity: 0;
    }

    .splash-content {
      position: relative;
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .splash-logo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      position: absolute;
    }

    .rotating-circle {
      position: absolute;
      width: 200px;
      height: 200px;
      border: 4px solid transparent;
      border-top-color: #1565C0;
      border-right-color: #1565C0;
      border-radius: 50%;
      animation: rotate 2s linear infinite;
    }

    @keyframes rotate {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .app-name {
      position: absolute;
      bottom: -60px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 24px;
      font-weight: 600;
      color: #1565C0;
      white-space: nowrap;
    }
  </style>
</head>

<body>
  <!-- Splash Screen -->
  <div id="splash-screen">
    <div class="splash-content">
      <img src="favicon.png" alt="Kirana Konu Logo" class="splash-logo">
      <div class="rotating-circle"></div>
      <div class="app-name">Kirana Konu</div>
    </div>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Hide splash screen when Flutter app is ready
    window.addEventListener('load', function () {
      // Wait for Flutter to be fully loaded
      setTimeout(function () {
        var splash = document.getElementById('splash-screen');
        if (splash) {
          splash.classList.add('fade-out');
          setTimeout(function () {
            splash.style.display = 'none';
          }, 500);
        }
      }, 1000); // Show splash for at least 1 second
    });
  </script>
</body>

</html>
